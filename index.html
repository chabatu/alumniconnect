<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yapım Aşamasında</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Montserrat', sans-serif;
}

body {
    height: 100vh;
    background: url('https://images.unsplash.com/photo-1492724441997-5dc865305da7') no-repeat center center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* Blur overlay */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(8px);
    background: rgba(0,0,0,0.5);
}

/* Container */
.container {
    position: relative;
    text-align: center;
    z-index: 2;
}

/* Title */
h1 {
    font-size: 60px;
    letter-spacing: 5px;
    margin-bottom: 10px;
}

.subtitle {
    font-size: 14px;
    letter-spacing: 3px;
    margin-bottom: 30px;
    opacity: 0.8;
}

/* Progress bar */
.progress-container {
    width: 300px;
    height: 6px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    margin: 0 auto 10px;
}

.progress-bar {
    width: 60%;
    height: 100%;
    background: #4da6ff;
    border-radius: 10px;
}

/* Button */
button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    background: #4da6ff;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: #3399ff;
}

/* Social icons */
.social {
    margin-top: 40px;
}

.social a {
    display: inline-block;
    width: 45px;
    height: 45px;
    line-height: 45px;
    margin: 5px;
    border: 1px solid white;
    border-radius: 50%;
    text-align: center;
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

.social a:hover {
    background: white;
    color: black;
}

/* Footer */
footer {
    position: absolute;
    bottom: 20px;
    font-size: 12px;
    opacity: 0.7;
    text-align: center;
    width: 100%;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">
    <h1>UNDER<br>CONSTRUCTION</h1>
    <div class="subtitle">SITE YAKINDA HAZIR</div>

    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>

    <button>Beni Haberdar Et</button>

    <div class="social">
        <a href="#">F</a>
        <a href="#">in</a>
        <a href="#">IG</a>
        <a href="#">T</a>
    </div>
</div>

<footer>
    © 2026 - Tüm hakları saklıdır
</footer>

</body>
</html>
