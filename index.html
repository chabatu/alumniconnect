<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yapım Aşamasında</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #1e1e2f, #3a3a60);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    overflow: hidden;
}

/* Background glow */
body::before {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, #4da6ff55, transparent 70%);
    top: -100px;
    left: -100px;
}

/* Glass container */
.container {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 50px 40px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    max-width: 400px;
    width: 90%;
}

/* Title */
h1 {
    font-size: 42px;
    letter-spacing: 3px;
    margin-bottom: 10px;
}

.subtitle {
    font-size: 13px;
    letter-spacing: 2px;
    opacity: 0.7;
    margin-bottom: 30px;
}

/* Progress */
.progress-container {
    width: 100%;
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 10px;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4da6ff, #7f5cff);
    animation: load 3s ease forwards;
}

@keyframes load {
    from { width: 0; }
    to { width: 75%; }
}

/* Button */
button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    background: linear-gradient(135deg, #4da6ff, #7f5cff);
    color: white;
    cursor: pointer;
    border-radius: 30px;
    font-size: 14px;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(77,166,255,0.4);
}

/* Social */
.social {
    margin-top: 30px;
}

.social a {
    display: inline-block;
    width: 42px;
    height: 42px;
    line-height: 42px;
    margin: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

.social a:hover {
    background: linear-gradient(135deg, #4da6ff, #7f5cff);
}

/* Footer */
footer {
    position: absolute;
    bottom: 20px;
    font-size: 12px;
    opacity: 0.5;
}
</style>
</head>

<body>

<div class="container">
    <h1>UNDER CONSTRUCTION</h1>
    <div class="subtitle">SITE YAKINDA HAZIR</div>

    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>

    <button>Beni Haberdar Et</button>

    <div class="social">
        <a href="#">F</a>
        <a href="#">in</a>
        <a href="#">IG</a>
        <a href="#">T</a>
    </div>
</div>

<footer>
    © 2026 - Tüm hakları saklıdır
</footer>

</body>
</html>
