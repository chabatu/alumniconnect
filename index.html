<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALCOP</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #0f172a;
    --card: #111827;
    --text: #e5e7eb;
    --muted: #9ca3af;
    --accent: #6366f1;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: radial-gradient(circle at 20% 20%, #1e293b, #020617);
    color: var(--text);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Layout */
.wrapper {
    text-align: center;
    max-width: 500px;
    padding: 20px;
}

/* Badge */
.badge {
    display: inline-block;
    background: rgba(99,102,241,0.1);
    color: #a5b4fc;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    margin-bottom: 20px;
}

/* Title */
h1 {
    font-size: 48px;
    font-weight: 600;
    margin-bottom: 15px;
}

p {
    color: var(--muted);
    font-size: 16px;
    margin-bottom: 30px;
}

/* Progress */
.progress-wrapper {
    margin-bottom: 25px;
}

.progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
}

.progress-bar {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 999px;
    overflow: hidden;
}

.progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #6366f1, #8b5cf6);
    border-radius: 999px;
    animation: load 2s ease forwards;
}

/* Smooth load */
@keyframes load {
    from { width: 0; }
    to { width: 70%; }
}

/* Email form */
.form {
    display: flex;
    gap: 10px;
    background: var(--card);
    padding: 6px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.05);
}

input {
    flex: 1;
    border: none;
    background: transparent;
    padding: 12px;
    color: white;
    outline: none;
}

button {
    background: var(--accent);
    border: none;
    padding: 12px 18px;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #4f46e5;
}

/* Divider */
.divider {
    margin: 30px 0;
    height: 1px;
    background: rgba(255,255,255,0.05);
}

/* Social */
.social {
    display: flex;
    justify-content: center;
    gap: 15px;
}

.social a {
    color: var(--muted);
    font-size: 14px;
    text-decoration: none;
    transition: 0.2s;
}

.social a:hover {
    color: white;
}

/* Footer */
footer {
    margin-top: 40px;
    font-size: 12px;
    color: var(--muted);
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="badge">🚧 Yakında</div>

    <h1>Harika bir şey geliyor.</h1>
    <p>Üzerinde çalışıyoruz. Yayına girdiğimizde haberdar olmak için email bırak.</p>

    <!-- Progress -->
    <div class="progress-wrapper">
        <div class="progress-info">
            <span>İlerleme</span>
            <span>%70</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
    </div>

    <div class="form">
        <input type="email" placeholder="Email adresin">
        <button>Haberdar et</button>
    </div>

    <div class="divider"></div>

    <div class="social">
        <a href="#">Twitter</a>
        <a href="#">Instagram</a>
        <a href="#">LinkedIn</a>
    </div>

    <footer>
        © 2026 Tüm hakları saklıdır
    </footer>

</div>

</body>
</html>
